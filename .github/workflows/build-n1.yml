name: N1盒子专用全插件稳定固件
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'

env:
  TZ: Asia/Shanghai
  UPLOAD_RELEASE: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 安装编译依赖
        run: |
          sudo apt update -y
          sudo apt install -y build-essential flex bison gawk libncurses-dev git libssl-dev unzip

      - name: 拉取24.10稳定分支源码
        run: |
          git clone -b openwrt-24.10 https://github.com/immortalwrt/immortalwrt openwrt
          cd openwrt
          sed -i '$a src-git kenzo https://github.com/kenzok8/openwrt-packages' feeds.conf.default
          sed -i '$a src-git small https://github.com/kenzok8/small' feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: N1晶晨ARM64架构适配
        run: |
          cd openwrt
          make defconfig
          echo "CONFIG_TARGET_armsr=y" > .config
          echo "CONFIG_TARGET_armsr_armv8=y" >> .config
          echo "CONFIG_TARGET_armsr_armv8_DEVICE_phicomm_n1=y" >> .config
          echo "CONFIG_LINUX_6_6=y" >> .config
          echo "CONFIG_TARGET_ROOTFS_PARTSIZE=8192" >> .config
          echo "CONFIG_TARGET_KERNEL_PARTSIZE=128" >> .config
          echo "CONFIG_TARGET_IMAGES_GZIP=y" >> .config
          echo "CONFIG_TARGET_EXT4=y" >> .config
          echo "CONFIG_TARGET_SQUASHFS=y" >> .config
          echo "CONFIG_PACKAGE_aml-soc-fan=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-amlogic=y" >> .config
          make defconfig

      - name: 写入全套满配所有插件
        run: |
          cd openwrt
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE-luci-theme-argon=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-argon-config=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-store=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-iStore=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-passwall=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-openclash=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-mwan3=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-turboacc=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-alist=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-dockerman=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-adguardhome=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-smartdns=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-samba4=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-frpc=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-macvlan=y" >> .config
          echo "CONFIG_PACKAGE_htop=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-downlink=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-backup=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-cloudsync=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-syncthing=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-filetransfer=y" >> .config
          echo "CONFIG_PACKAGE_usb-modeswitch=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-storage=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-net=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-net-rndis=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-net-cdc-ether=y" >> .config
          echo "CONFIG_PACKAGE_mount-utils=y" >> .config
          echo "CONFIG_PACKAGE_rsync=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-nft-qos=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-vlan-switch=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-macbind=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-flowoffload=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-splitrouting=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-gameaccelerate=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-gamespeed=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-lancache=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-tcpoptimize=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-latency=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-jitterfix=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-multiaccount=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-isolateclient=y" >> .config
          make defconfig

      - name: 后台8个高速固件下载入口
        run: |
          cd openwrt
          mkdir -p package/luci-app-downlink/luasrc/view/downlink
          echo 'module("luci.controller.downlink",function()function index()entry({"admin","system","downlink"},template("downlink/index"),_("固件八大高速下载入口"),99).dependent=false end end)' > package/luci-app-downlink/luci-app-downlink.lua
          echo '<%+header%><h2>🔥八大高速固件下载通道</h2><p>N1专用 稳定6.6内核 全插件齐全</p><ul style="font-size:15px;line-height:2.3;"><li>① GitHub官方极速下载</li><li>② Actions备用稳定下载</li><li>③ 蓝奏云不限速通道</li><li>④ 奶牛快传满速通道</li><li>⑤ 阿里云盘高速通道</li><li>⑥ 天翼云电信极速</li><li>⑦ 腾讯微云分流</li><li>⑧ 兜底应急下载</li></ul><%+footer%>' > package/luci-app-downlink/luasrc/view/downlink/index.htm

      - name: 全速多线程编译
        run: |
          cd openwrt
          make -j$(nproc) V=s

      - name: 上传N1固件
        uses: actions/upload-artifact@v4
        with:
          name: N1盒子全插件固件
          path: openwrt/bin/targets/armsr/armv8/*.img.gz

      - name: 发布正式版本
        if: env.UPLOAD_RELEASE == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: N1稳定6.6全插件固件
          name: N1自用满配游戏多开固件
          body: N1晶晨专用固件，内置全插件+iStore商店+游戏多开优化，每周周日凌晨2点自动更新
          files: openwrt/bin/targets/armsr/armv8/*.img.gz
