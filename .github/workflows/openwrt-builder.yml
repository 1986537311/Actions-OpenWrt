name: 多通道全插件X86固件编译
on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  UPLOAD_RELEASE: true
  UPLOAD_COW: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 安装编译依赖
        run: |
          sudo apt update -y
          sudo apt install -y build-essential flex bison gawk libncurses-dev git libssl-dev unzip curl wget

      - name: 拉取ImmortalWrt源码
        run: |
          git clone --depth 1 https://github.com/immortalwrt/immortalwrt openwrt
          cd openwrt
          sed -i '$a src-git kenzo https://github.com/kenzok8/openwrt-packages' feeds.conf.default
          sed -i '$a src-git small https://github.com/kenzok8/small' feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 写入全插件配置
        run: |
          cd openwrt
          cat > .config << 'EOF'
CONFIG_TARGET_x86=y
CONFIG_TARGET_x86_64=y
CONFIG_TARGET_x86_64_DEVICE_generic=y
CONFIG_LINUX_6_6=y
CONFIG_TARGET_ROOTFS_PARTSIZE=8192
CONFIG_TARGET_KERNEL_PARTSIZE=128
CONFIG_TARGET_IMAGES_GZIP=y
CONFIG_TARGET_EXT4=y
CONFIG_TARGET_SQUASHFS=y
CONFIG_TARGET_KVM=y
CONFIG_TARGET_VIRTUALIZATION=y

CONFIG_PACKAGE_luci=y
CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
CONFIG_PACKAGE_luci-theme-argon=y
CONFIG_PACKAGE_luci-app-argon-config=y
CONFIG_PACKAGE_luci-app-store=y
CONFIG_PACKAGE_luci-app-passwall=y
CONFIG_PACKAGE_luci-app-openclash=y
CONFIG_PACKAGE_luci-app-mwan3=y
CONFIG_PACKAGE_luci-app-turboacc=y
CONFIG_PACKAGE_luci-app-alist=y
CONFIG_PACKAGE_luci-app-dockerman=y
CONFIG_PACKAGE_luci-app-adguardhome=y
CONFIG_PACKAGE_luci-app-smartdns=y
CONFIG_PACKAGE_luci-app-samba4=y
CONFIG_PACKAGE_luci-app-frpc=y
CONFIG_PACKAGE_luci-app-macvlan=y
CONFIG_PACKAGE_luci-app-kvm=y
CONFIG_PACKAGE_htop=y
EOF
          make defconfig

      # 关键！内置多线路下载入口到路由器后台
      - name: 内置后台多线路下载页
        run: |
          cd openwrt
          mkdir -p package/luci-app-downlink/luasrc/view/downlink
          # 控制器文件
          cat > package/luci-app-downlink/luci-app-downlink.lua <<EOF
module("luci.controller.downlink", package.seeall)
function index()
    entry({"admin","system","downlink"},template("downlink/index"),_("固件高速下载入口"),99).dependent=false
end
EOF
          # 后台页面文件（这里直接写死了4个下载入口）
          cat > package/luci-app-downlink/luasrc/view/downlink/index.htm <<EOF
<%+header%>
<h2 style="color:#2c3e50;">超多高速固件下载通道</h2>
<ul style="font-size:16px;line-height:2.5;list-style-type:disc;padding-left:20px;">
<li>✅ 1. 仓库主页 Releases 满速下载：<a href="https://github.com/${{ github.repository }}/releases" target="_blank" style="color:#3498db;text-decoration:none;">点击直达</a></li>
<li>✅ 2. Actions 内置固件下载：<a href="https://github.com/${{ github.repository }}/actions" target="_blank" style="color:#3498db;text-decoration:none;">点击直达</a></li>
<li>✅ 3. 蓝奏云不限速通道：<a href="https://www.lanzou.com/" target="_blank" style="color:#3498db;text-decoration:none;">点击直达（编译完成后更新）</a></li>
<li>✅ 4. 奶牛快传国内满速：<a href="https://cowtransfer.com/" target="_blank" style="color:#3498db;text-decoration:none;">点击直达（编译完成后更新）</a></li>
</ul>
<%+footer%>
EOF
          # 把这个插件加入配置
          echo "CONFIG_PACKAGE_luci-app-downlink=y" >> .config
          make defconfig

      - name: 单线程编译（防报错）
        run: |
          cd openwrt
          make -j1 V=s

      # GitHub通道1：Actions内置下载
      - name: 通道1 Actions内置下载
        uses: actions/upload-artifact@v4
        with:
          name: 内置固件下载
          path: openwrt/bin/targets/x86/64/*.img.gz

      # GitHub通道2：Releases满速发布
      - name: 通道2 Releases正式发布
        if: env.UPLOAD_RELEASE == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: 全插件X86固件
          name: 6.6内核全插件稳定版
          body: 内置游戏加速、多开隔离、代理、Docker全套插件，后台自带4个下载入口
          files: openwrt/bin/targets/x86/64/*.img.gz

      # 通道3：奶牛快传国内满速
      - name: 通道3 奶牛快传上传
        if: env.UPLOAD_COW == 'true'
        uses: yanzaiyu/cowtransfer-upload-action@main
        with:
          file_path: openwrt/bin/targets/x86/64/*.img.gz
