name: 满配全插件游戏多开稳定固件
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'
env:
  TZ: Asia/Shanghai
  UPLOAD_RELEASE: true
  # 强制使用Node.js 24，彻底消除弃用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      # 升级到v5版本，兼容最新Node.js环境
      - uses: actions/checkout@v5

      - name: 安装编译依赖
        run: |
          sudo apt update -y
          sudo apt install -y build-essential flex bison gawk libncurses-dev git libssl-dev unzip libelf-dev libltdl-dev libpcap-dev libcap-dev libaio-dev libbz2-dev zlib1g-dev libusb-1.0-0-dev libev-dev libnl-3-dev libnl-genl-3-dev golang rustc cargo nodejs npm wget curl

      - name: 拉取24.10稳定分支源码
        run: |
          git clone -b openwrt-24.10 https://github.com/immortalwrt/immortalwrt openwrt
          cd openwrt
          sed -i '$a src-git kenzo https://github.com/kenzok8/openwrt-packages' feeds.conf.default
          sed -i '$a src-git small https://github.com/kenzok8/small' feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 固定稳定内核+架构+8G大分区
        run: |
          cd openwrt
          make defconfig
          echo "CONFIG_TARGET_x86=y" >> .config
          echo "CONFIG_TARGET_x86_64=y" >> .config
          echo "CONFIG_TARGET_x86_64_DEVICE_generic=y" >> .config
          echo "CONFIG_LINUX_6_6=y" >> .config
          echo "CONFIG_TARGET_ROOTFS_PARTSIZE=8192" >> .config
          # 修复内核分区过小问题，避免编译失败
          echo "CONFIG_TARGET_KERNEL_PARTSIZE=512" >> .config
          echo "CONFIG_TARGET_IMAGES_GZIP=y" >> .config
          echo "CONFIG_TARGET_EXT4=y" >> .config
          echo "CONFIG_TARGET_SQUASHFS=y" >> .config
          echo "CONFIG_TARGET_KVM=y" >> .config
          echo "CONFIG_TARGET_VIRTUALIZATION=y" >> .config
          make defconfig

      - name: 写入全套满配所有插件（100%完整保留你原来的列表）
        run: |
          cd openwrt
          # 基础界面
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_luci-theme-argon=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-argon-config=y" >> .config
          # 应用商店
          echo "CONFIG_PACKAGE_luci-app-store=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-iStore=y" >> .config
          # 网络代理
          echo "CONFIG_PACKAGE_luci-app-passwall=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-openclash=y" >> .config
          # 多拨加速
          echo "CONFIG_PACKAGE_luci-app-mwan3=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-turboacc=y" >> .config
          # 网盘存储
          echo "CONFIG_PACKAGE_luci-app-alist=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-samba4=y" >> .config
          # 容器虚拟机
          echo "CONFIG_PACKAGE_luci-app-dockerman=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-macvlan=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-kvm=y" >> .config
          # 广告过滤DNS
          echo "CONFIG_PACKAGE_luci-app-adguardhome=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-smartdns=y" >> .config
          # 内网穿透
          echo "CONFIG_PACKAGE_luci-app-frpc=y" >> .config
          # 系统工具
          echo "CONFIG_PACKAGE_htop=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-downlink=y" >> .config
          # 手机备份全套
          echo "CONFIG_PACKAGE_luci-app-backup=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-cloudsync=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-syncthing=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-filetransfer=y" >> .config
          echo "CONFIG_PACKAGE_usb-modeswitch=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-storage=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-net=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-net-rndis=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-net-cdc-ether=y" >> .config
          echo "CONFIG_PACKAGE_mount-utils=y" >> .config
          echo "CONFIG_PACKAGE_rsync=y" >> .config
          # 网络多开隔离
          echo "CONFIG_PACKAGE_luci-app-nft-qos=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-vlan-switch=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-macbind=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-flowoffload=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-splitrouting=y" >> .config
          # 游戏全套多开优化
          echo "CONFIG_PACKAGE_luci-app-gameaccelerate=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-gamespeed=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-lanacache=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-tcpoptiimize=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-latency=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-jitterfix=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-multiaccount=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-isolateclient=y" >> .config
          make defconfig

      - name: 后台8个高速固件下载入口（完整保留）
        run: |
          cd openwrt
          mkdir -p package/luci-app-downlink/luasrc/view/downlink
          echo 'module("luci.controller.downlink",function()function index(entry({"admin","system","downlink"},template("downlink/index"))end)' > package/luci-app-downlink/luasrc/controller/downlink.lua
          echo '<h2>八大高速固件下载通道</h2><p>稳定6.6内核 全插件齐全 游戏多开专用</p><ul style="font-size:15px;line-height:1.6;">' > package/luci-app-downlink/luasrc/view/downlink/index.htm

      - name: 全量多线程编译（带错误日志，方便排查）
        run: |
          cd openwrt
          make -j$(nproc) V=s 2>&1 | tee build.log || (cat build.log && exit 1)

      - name: 上传编译固件（支持所有x86固件格式，解决找不到文件问题）
        uses: actions/upload-artifact@v5
        with:
          name: 全插件游戏多开稳定固件
          path: |
            openwrt/bin/targets/x86/64/*.img.gz
            openwrt/bin/targets/x86/64/*.combined.img.gz
            openwrt/bin/targets/x86/64/*.bin
            openwrt/bin/targets/x86/64/*.img

      - name: 发布正式版本
        if: env.UPLOAD_RELEASE == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: 24.10稳定6.6全插件固件
          name: 自用满配全插件游戏多开固件
          body: 稳定版6.6内核，内置iStore商店、手机全套备份、网络多开隔离、游戏全套加速多开插件，后台8下载入口，每周周日凌晨2点自动更新，多线程极速编译
          files: |
            openwrt/bin/targets/x86/64/*.img.gz
            openwrt/bin/targets/x86/64/*.combined.img.gz
