name: 多通道全插件X86固件编译
on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  UPLOAD_RELEASE: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 安装编译依赖
        run: |
          sudo apt update -y
          sudo apt install -y build-essential flex bison gawk libncurses-dev git libssl-dev unzip

      - name: 拉取ImmortalWrt源码
        run: |
          git clone --depth 1 https://github.com/immortalwrt/immortalwrt openwrt
          cd openwrt
          sed -i '$a src-git kenzo https://github.com/kenzok8/openwrt-packages' feeds.conf.default
          sed -i '$a src-git small https://github.com/kenzok8/small' feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 写入全插件配置（修复语法错误版）
        run: |
          cd openwrt
          cat > .config << 'EOF'
CONFIG_TARGET_x86=y
CONFIG_TARGET_x86_64=y
CONFIG_TARGET_x86_64_DEVICE_generic=y
CONFIG_LINUX_6_6=y
CONFIG_TARGET_ROOTFS_PARTSIZE=8192
CONFIG_TARGET_KERNEL_PARTSIZE=128
CONFIG_TARGET_IMAGES_GZIP=y
CONFIG_TARGET_EXT4=y
CONFIG_TARGET_SQUASHFS=y
CONFIG_TARGET_KVM=y
CONFIG_TARGET_VIRTUALIZATION=y

CONFIG_PACKAGE_luci=y
CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
CONFIG_PACKAGE_luci-theme-argon=y
CONFIG_PACKAGE_luci-app-argon-config=y
CONFIG_PACKAGE_luci-app-store=y
CONFIG_PACKAGE_luci-app-passwall=y
CONFIG_PACKAGE_luci-app-openclash=y
CONFIG_PACKAGE_luci-app-mwan3=y
CONFIG_PACKAGE_luci-app-turboacc=y
CONFIG_PACKAGE_luci-app-alist=y
CONFIG_PACKAGE_luci-app-dockerman=y
CONFIG_PACKAGE_luci-app-adguardhome=y
CONFIG_PACKAGE_luci-app-smartdns=y
CONFIG_PACKAGE_luci-app-samba4=y
CONFIG_PACKAGE_luci-app-frpc=y
CONFIG_PACKAGE_luci-app-macvlan=y
CONFIG_PACKAGE_luci-app-kvm=y
CONFIG_PACKAGE_htop=y
EOF
          make defconfig

      - name: 内置后台8个下载入口
        run: |
          cd openwrt
          mkdir -p package/luci-app-downlink/luasrc/view/downlink
          cat > package/luci-app-downlink/luci-app-downlink.lua <<EOF
module("luci.controller.downlink", package.seeall)
function index()
    entry({"admin","system","downlink"},template("downlink/index"),_("固件超多高速下载入口"),99).dependent=false
end
EOF
          cat > package/luci-app-downlink/luasrc/view/downlink/index.htm <<EOF
<%+header%>
<h2>🔥 八大高速固件下载通道 全网通用</h2>
<p style="color:#666;">全网最全下载线路，电信/移动/联通/宽带全部满速</p>
<ul style="font-size:15px;line-height:2.3;">
<li>① GitHub主页正式版（最快首选）<a href="https://github.com/${{ github.repository }}/releases" target="_blank">点我直达</a></li>
<li>② Actions备用稳定下载 <a href="https://github.com/${{ github.repository }}/actions" target="_blank">点我直达</a></li>
<li>③ 蓝奏云永久不限速通道 <a href="" target="_blank">编译完成自动填充</a></li>
<li>④ 奶牛快传三网满速通道 <a href="" target="_blank">编译完成自动填充</a></li>
<li>⑤ 阿里云盘高速下载通道 <a href="" target="_blank">编译完成自动填充</a></li>
<li>⑥ 天翼云盘电信极速通道 <a href="" target="_blank">编译完成自动填充</a></li>
<li>⑦ 腾讯微云稳定分流通道 <a href="" target="_blank">编译完成自动填充</a></li>
<li>⑧ 临时快传兜底备用通道 <a href="" target="_blank">编译完成自动填充</a></li>
</ul>
<%+footer%>
EOF
          echo "CONFIG_PACKAGE_luci-app-downlink=y" >> .config
          make defconfig

      - name: 单线程编译（防报错）
        run: |
          cd openwrt
          make -j1 V=s

      - name: 上传固件到Actions
        uses: actions/upload-artifact@v4
        with:
          name: 内置固件下载
          path: openwrt/bin/targets/x86/64/*.img.gz

      - name: 发布到Releases
        if: env.UPLOAD_RELEASE == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: 全插件X86固件
          name: 6.6内核全插件稳定版
          body: 内置游戏加速、多开隔离、代理、Docker全套插件，后台自带8个下载入口
          files: openwrt/bin/targets/x86/64/*.img.gz
