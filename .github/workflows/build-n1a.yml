EOF

      - name: 全速编译
        run: cd openwrt && make -j$(nproc) V=s

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: N1全功能完整版
          path: openwrt/bin/targets/armsr/armv8/*.img.gz
