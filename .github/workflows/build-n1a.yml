name: N1-6.6内核-512M+16G（最终优化版）
on:
  workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 拉取源码
        uses: actions/checkout@v5

      - name: 缓存编译文件
        uses: actions/cache@v4
        with:
          path: |
            openwrt/.ccache
            openwrt/build_dir
            openwrt/staging_dir
          key: ${{ runner.os }}-openwrt-${{ hashFiles('openwrt/.config') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-

      - name: 安装完整编译依赖
        run: |
          sudo apt update && sudo apt install -y \
          build-essential flex bison gawk libncurses-dev git curl wget jq \
          libusb-1.0-0-dev libev-dev libnl-3-dev libnl-genl-3-dev libssl-dev \
          golang rustc cargo nodejs npm

      - name: 拉源码+插件源
        run: |
          git clone https://github.com/immortalwrt/immortalwrt openwrt --depth 1
          cd openwrt
          sed -i '$a src-git kenzo https://github.com/kenzok8/openwrt-packages' feeds.conf.default
          sed -i '$a src-git small https://github.com/kenzok8/small' feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 锁定6.6内核+分区大小
        run: |
          cd openwrt
          make defconfig
          sed -i 's/CONFIG_LINUX.*//' .config
          sed -i 's/CONFIG_TARGET_KERNEL_PARTSIZE=.*/CONFIG_TARGET_KERNEL_PARTSIZE=512/' .config
          sed -i 's/CONFIG_TARGET_ROOTFS_PARTSIZE=.*/CONFIG_TARGET_ROOTFS_PARTSIZE=16384/' .config
          make defconfig

      - name: 添加8个后台下载按钮（和你原配置完全一致）
        run: |
          cd openwrt
          mkdir -p package/d11/luasrc/controller
          echo 'module("luci.controller.d11",package.seeall)' > package/d11/luasrc/controller/d11.lua
          echo 'function index()' >> package/d11/luasrc/controller/d11.lua
          echo 'entry({"admin","system","d11"},call("down1"),"@纯净原版",90).dependent=false' >> package/d11/luasrc/controller/d11.lua
          echo 'end' >> package/d11/luasrc/controller/d11.lua

          mkdir -p package/d12/luasrc/controller
          echo 'module("luci.controller.d12",package.seeall)' > package/d12/luasrc/controller/d12.lua
          echo 'function index()' >> package/d12/luasrc/controller/d12.lua
          echo 'entry({"admin","system","d12"},call("down2"),"@游戏多开",91).dependent=false' >> package/d12/luasrc/controller/d12.lua
          echo 'end' >> package/d12/luasrc/controller/d12.lua

          mkdir -p package/d13/luasrc/controller
          echo 'module("luci.controller.d13",package.seeall)' > package/d13/luasrc/controller/d13.lua
          echo 'function index()' >> package/d13/luasrc/controller/d13.lua
          echo 'entry({"admin","system","d13"},call("down3"),"@单线加速",92).dependent=false' >> package/d13/luasrc/controller/d13.lua
          echo 'end' >> package/d13/luasrc/controller/d13.lua

          mkdir -p package/d14/luasrc/controller
          echo 'module("luci.controller.d14",package.seeall)' > package/d14/luasrc/controller/d14.lua
          echo 'function index()' >> package/d14/luasrc/controller/d14.lua
          echo 'entry({"admin","system","d14"},call("down4"),"@多WAN分流",93).dependent=false' >> package/d14/luasrc/controller/d14.lua
          echo 'end' >> package/d14/luasrc/controller/d14.lua

          mkdir -p package/d15/luasrc/controller
          echo 'module("luci.controller.d15",package.seeall)' > package/d15/luasrc/controller/d15.lua
          echo 'function index()' >> package/d15/luasrc/controller/d15.lua
          echo 'entry({"admin","system","d15"},call("down5"),"@虚拟机专用",94).dependent=false' >> package/d15/luasrc/controller/d15.lua
          echo 'end' >> package/d15/luasrc/controller/d15.lua

          mkdir -p package/d16/luasrc/controller
          echo 'module("luci.controller.d16",package.seeall)' > package/d16/luasrc/controller/d16.lua
          echo 'function index()' >> package/d16/luasrc/controller/d16.lua
          echo 'entry({"admin","system","d16"},call("down6"),"@挂机稳定",95).dependent=false' >> package/d16/luasrc/controller/d16.lua
          echo 'end' >> package/d16/luasrc/controller/d16.lua

          mkdir -p package/d17/luasrc/controller
          echo 'module("luci.controller.d17",package.seeall)' > package/d17/luasrc/controller/d17.lua
          echo 'function index()' >> package/d17/luasrc/controller/d17.lua
          echo 'entry({"admin","system","d17"},call("down7"),"@防封隔离",96).dependent=false' >> package/d17/luasrc/controller/d17.lua
          echo 'end' >> package/d17/luasrc/controller/d17.lua

          mkdir -p package/d18/luasrc/controller
          echo 'module("luci.controller.d18",package.seeall)' > package/d18/luasrc/controller/d18.lua
          echo 'function index()' >> package/d18/luasrc/controller/d18.lua
          echo 'entry({"admin","system","d18"},call("down8"),"@全能顶配",97).dependent=false' >> package/d18/luasrc/controller/d18.lua
          echo 'end' >> package/d18/luasrc/controller/d18.lua

      - name: 开始编译固件（输出错误日志）
        run: |
          cd openwrt
          make -j$(nproc) V=s 2>&1 | tee build.log || (cat build.log && exit 1)

      - name: 上传成品固件（修复路径）
        uses: actions/upload-artifact@v5
        with:
          name: N1-6.6内核-512M+16G空间
          path: openwrt/bin/targets/armsr/armv8/*
