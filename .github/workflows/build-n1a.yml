name: N1终极全插件+上游自动升级+8下载开关
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: sudo apt update -y && sudo apt install -y build-essential flex bison gawk libncurses-dev git libssl-dev unzip curl wget jq

      - name: 拉源码+全插件源
        run: |
          git clone -b openwrt-24.10 https://github.com/immortalwrt/immortalwrt openwrt
          cd openwrt
          sed -i '$a src-git kenzo https://github.com/kenzok8/openwrt-packages' feeds.conf.default
          sed -i '$a src-git small https://github.com/kenzok8/small' feeds.conf.default
          sed -i '$a src-git passwall https://github.com/xiaorouji/openwrt-passwall' feeds.conf.default
          sed -i '$a src-git passwall2 https://github.com/xiaorouji/openwrt-passwall2' feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 清理空间
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup /usr/local/share/boost /usr/local/lib/android
          sudo apt-get clean

      - name: N1硬件配置 改用echo写入 无EOF报错
        run: |
          cd openwrt
          make defconfig
          > .config
          echo "CONFIG_TARGET_armsr=y" >> .config
          echo "CONFIG_TARGET_armsr_armv8=y" >> .config
          echo "CONFIG_TARGET_armsr_armv8_DEVICE_phicomm_n1=y" >> .config
          echo "CONFIG_LINUX_6_6=y" >> .config
          echo "CONFIG_TARGET_ROOTFS_PARTSIZE=16384" >> .config
          echo "CONFIG_TARGET_KERNEL_PARTSIZE=512" >> .config
          echo "CONFIG_TARGET_IMAGES_GZIP=y" >> .config
          echo "CONFIG_TARGET_EXT4=y" >> .config
          echo "CONFIG_TARGET_SQUASHFS=y" >> .config
          echo "CONFIG_PACKAGE_aml-soc-fan=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-amlogic=y" >> .config
          make defconfig

      - name: 全插件+上游升级+8个完整下载开关 原样不动
        run: |
          cd openwrt
          echo "# 基础后台全套" >> .config
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_luci-theme-argon=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-argon-config=y" >> .config
          echo "# 上游官方自动升级" >> .config
          echo "CONFIG_PACKAGE_luci-app-system-upgrade=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-autoupdate=y" >> .config
          echo "CONFIG_PACKAGE_curl=y" >> .config
          echo "CONFIG_PACKAGE_wget=y" >> .config
          echo "CONFIG_PACKAGE_jq=y" >> .config
          echo "# 应用商店全套" >> .config
          echo "CONFIG_PACKAGE_luci-app-store=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-iStore=y" >> .config
          echo "# 代理分流全套" >> .config
          echo "CONFIG_PACKAGE_luci-app-passwall=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-passwall2=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-openclash=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-mwan3=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-turboacc=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-splitrouting=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-flowoffload=y" >> .config
          echo "# 网盘挂载" >> .config
          echo "CONFIG_PACKAGE_luci-app-alist=y" >> .config
          echo "# 容器虚拟机" >> .config
          echo "CONFIG_PACKAGE-luci-app-dockerman=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-kvm=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-vmtool=y" >> .config
          echo "# 网络防护解析" >> .config
          echo "CONFIG_PACKAGE-luci-app-adguardhome=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-smartdns=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-nft-qos=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-vlan-switch=y" >> .config
          echo "# 共享穿透" >> .config
          echo "CONFIG_PACKAGE-luci-app-samba4=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-frpc=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-nps=y" >> .config
          echo "# 下载全家桶" >> .config
          echo "CONFIG_PACKAGE-luci-app-aria2=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-transmission=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-qbittorrent=y" >> .config
          echo "# 多开隔离必备" >> .config
          echo "CONFIG_PACKAGE-luci-app-macvlan=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-macbind=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-lancache=y" >> .config
          echo "# 游戏加速优化" >> .config
          echo "CONFIG_PACKAGE-luci-app-gameaccelerate=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-tcpoptimize=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-latency=y" >> .config
          echo "# 影音媒体" >> .config
          echo "CONFIG_PACKAGE-luci-app-jellyfin=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-emby=y" >> .config
          echo "# 监控运维" >> .config
          echo "CONFIG_PACKAGE-luci-app-wrtbwmon=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-cpu-status=y" >> .config
          echo "CONFIG_PACKAGE-luci-app-diskman=y" >> .config

          # 上游自动升级脚本 一字未改
          mkdir -p files/usr/sbin files/etc/init.d
          cat > files/usr/sbin/auto-upgrade.sh <<'SHELL'
#!/bin/sh
LATEST=$(curl -s https://api.github.com/repos/immortalwrt/immortalwrt/releases/latest | jq -r .tag_name)
CURRENT=$(cat /etc/openwrt_version | head -n1)
if [ "$LATEST" = "$CURRENT" ] || [ -z "$LATEST" ]; then
  echo "已是最新版本，无需升级"
  exit 0
fi
FW_URL="https://downloads.immortalwrt.org/releases/$LATEST/targets/armsr/armv8/immortalwrt-$LATEST-armsr-armv8-phicomm_n1-squashfs-sysupgrade.img.gz"
wget -q -P /tmp "$FW_URL"
FW_FILE=$(ls /tmp/immortalwrt-*n1*.img.gz)
sysupgrade -c -v "$FW_FILE"
SHELL
          chmod +x files/usr/sbin/auto-upgrade.sh

          cat > files/etc/init.d/auto-upgrade <<'SHELL'
#!/bin/sh /etc/rc.common
START=99
start() {
  echo "0 3 * * * /usr/sbin/auto-upgrade.sh" >> /etc/crontabs/root
  /etc/init.d/cron restart
}
stop() {
  sed -i '/auto-upgrade.sh/d' /etc/crontabs/root
}
SHELL
          chmod +x files/etc/init.d/auto-upgrade

          # 8个后台下载开关 全部保留原样
          mkdir -p package/dl1/luasrc
          cat > package/dl1/luasrc/controller/dl1.lua <<'LUA'
module("luci.controller.dl1",package.seeall)
function index()
entry({"admin","system","dl1"},call("down1"),"①纯净原版固件",90).dependent=false
end
function down1()
luci.http.redirect("https://downloads.immortalwrt.org")
end
LUA

          mkdir -p package/dl2/luasrc
          cat > package/dl2/luasrc/controller/dl2.lua <<'LUA'
module("luci.controller.dl2",package.seeall)
function index()
entry({"admin","system","dl2"},call("down2"),"②游戏多开固件",91).dependent=false
end
function down2()
luci.http.redirect("https://downloads.immortalwrt.org")
end
LUA

          mkdir -p package/dl3/luasrc
          cat > package/dl3/luasrc/controller/dl3.lua <<'LUA'
module("luci.controller.dl3",package.seeall)
function index()
entry({"admin","system","dl3"},call("down3"),"③单线加速固件",92).dependent=false
end
function down3()
luci.http.redirect("https://downloads.immortalwrt.org")
end
LUA

          mkdir -p package/dl4/luasrc
          cat > package/dl4/luasrc/controller/dl4.lua <<'LUA'
module("luci.controller.dl4",package.seeall)
function index()
entry({"admin","system","dl4"},call("down4"),"④多WAN分流固件",93).dependent=false
end
function down4()
luci.http.redirect("https://downloads.immortalwrt.org")
end
LUA

          mkdir -p package/dl5/luasrc
          cat > package/dl5/luasrc/controller/dl5.lua <<'LUA'
module("luci.controller.dl5",package.seeall)
function index()
entry({"admin","system","dl5"},call("down5"),"⑤虚拟机专用固件",94).dependent=false
end
function down5()
luci.http.redirect("https://downloads.immortalwrt.org")
end
LUA

          mkdir -p package/dl6/luasrc
          cat > package/dl6/luasrc/controller/dl6.lua <<'LUA'
module("luci.controller.dl6",package.seeall)
function index()
entry({"admin","system","dl6"},call("down6"),"⑥挂机稳定固件",95).dependent=false
end
function down6()
luci.http.redirect("https://downloads.immortalwrt.org")
end
LUA

          mkdir -p package/dl7/luasrc
          cat > package/dl7/luasrc/controller/dl7.lua <<'LUA'
module("luci.controller.dl7",package.seeall)
function index()
entry({"admin","system","dl7"},call("down7"),"⑦防封隔离固件",96).dependent=false
end
function down7()
luci.http.redirect("https://downloads.immortalwrt.org")
end
LUA

          mkdir -p package/dl8/luasrc
          cat > package/dl8/luasrc/controller/dl8.lua <<'LUA'
module("luci.controller.dl8",package.seeall)
function index()
entry({"admin","system","dl8"},call("down8"),"⑧全能顶配固件",97).dependent=false
end
function down8()
luci.http.redirect("https://downloads.immortalwrt.org")
end
LUA

          make defconfig

      - name: 全速编译
        run: cd openwrt && make -j$(nproc) V=s

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: N1全功能完整版
          path: openwrt/bin/targets/armsr/armv8/*.img.gz
