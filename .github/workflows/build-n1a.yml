luci.http.redirect("https://downloads.immortalwrt.org")
end
EOF

          mkdir -p package/dl7/luasrc
          cat > package/dl7/luasrc/controller/dl7.lua <<'EOF'
module("luci.controller.dl7",package.seeall)
function index()
entry({"admin","system","dl7"},call("down7"),"⑦防封隔离固件",96).dependent=false
end
function down7()
luci.http.redirect("https://downloads.immortalwrt.org")
end
EOF

          mkdir -p package/dl8/luasrc
          cat > package/dl8/luasrc/controller/dl8.lua <<'EOF'
module("luci.controller.dl8",package.seeall)
function index()
entry({"admin","system","dl8"},call("down8"),"⑧全能顶配固件",97).dependent=false
end
function down8()
luci.http.redirect("https://downloads.immortalwrt.org")
