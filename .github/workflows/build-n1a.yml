name: N1终极满配+8下载+自动升级
on:
  workflow_dispatch:
  schedule:
    - cron: 0 2 * * *

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: sudo apt update -y && sudo apt install -y build-essential flex bison gawk libncurses-dev git libssl-dev unzip curl wget jq

      - name: 拉源码+全插件源
        run: |
          git clone -b openwrt-24.10 https://github.com/immortalwrt/immortalwrt openwrt
          cd openwrt
          sed -i '$a src-git kenzo https://github.com/kenzok8/openwrt-packages' feeds.conf.default
          sed -i '$a src-git small https://github.com/kenzok8/small' feeds.conf.default
          sed -i '$a src-git passwall https://github.com/xiaorouji/openwrt-passwall' feeds.conf.default
          sed -i '$a src-git passwall2 https://github.com/xiaorouji/openwrt-passwall2' feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 清理空间
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup /usr/local/share/boost /usr/local/lib/android
          sudo apt-get clean

      - name: N1硬件配置
        run: |
          cd openwrt
          make defconfig
          cat > .config <<EOF
CONFIG_TARGET_armsr=y
CONFIG_TARGET_armsr_armv8=y
CONFIG_TARGET_armsr_armv8_DEVICE_phicomm_n1=y
CONFIG_LINUX_6_6=y
CONFIG_TARGET_ROOTFS_PARTSIZE=16384
CONFIG_TARGET_KERNEL_PARTSIZE=512
CONFIG_TARGET_IMAGES_GZIP=y
CONFIG_TARGET_EXT4=y
CONFIG_TARGET_SQUASHFS=y
CONFIG_PACKAGE_aml-soc-fan=y
CONFIG_PACKAGE_luci-app-amlogic=y
EOF
          make defconfig

      - name: 全插件+8下载按钮+自动升级
        run: |
          cd openwrt
          cat >> .config <<EOF
# 基础+中文+主题
CONFIG_PACKAGE_luci=y
CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
CONFIG_PACKAGE_luci-theme-argon=y
CONFIG_PACKAGE_luci-app-argon-config=y

# 系统自动升级（检测+下载+保留配置）
CONFIG_PACKAGE_luci-app-system-upgrade=y
CONFIG_PACKAGE_luci-app-autoupdate=y
CONFIG_PACKAGE_curl=y
CONFIG_PACKAGE_wget=y
CONFIG_PACKAGE_jq=y

# 全插件全开（不删减）
CONFIG_PACKAGE_luci-app-store=y
CONFIG_PACKAGE_luci-app-iStore=y
CONFIG_PACKAGE_luci-app-passwall=y
CONFIG_PACKAGE_luci-app-passwall2=y
CONFIG_PACKAGE_luci-app-openclash=y
CONFIG_PACKAGE_luci-app-mwan3=y
CONFIG_PACKAGE_luci-app-turboacc=y
CONFIG_PACKAGE_luci-app-splitrouting=y
CONFIG_PACKAGE_luci-app-flowoffload=y
CONFIG_PACKAGE_luci-app-alist=y
CONFIG_PACKAGE_luci-app-dockerman=y
CONFIG_PACKAGE_luci-app-kvm=y
CONFIG_PACKAGE_luci-app-adguardhome=y
CONFIG_PACKAGE_luci-app-smartdns=y
CONFIG_PACKAGE_luci-app-nft-qos=y
CONFIG_PACKAGE_luci-app-samba4=y
CONFIG_PACKAGE_luci-app-frpc=y
CONFIG_PACKAGE_luci-app-nps=y
CONFIG_PACKAGE_luci-app-aria2=y
CONFIG_PACKAGE_luci-app-transmission=y
CONFIG_PACKAGE_luci-app-qbittorrent=y
CONFIG_PACKAGE_luci-app-macvlan=y
CONFIG_PACKAGE_luci-app-macbind=y
CONFIG_PACKAGE_luci-app-lancache=y
CONFIG_PACKAGE_luci-app-gameaccelerate=y
CONFIG_PACKAGE_luci-app-jellyfin=y
CONFIG_PACKAGE_luci-app-wrtbwmon=y
CONFIG_PACKAGE_luci-app-diskman=y
EOF

          # ========== 8个真实下载按钮（直接跳转下载） ==========
          mkdir -p package/dl1/luasrc/view/dl1
          cat > package/dl1/luasrc-controller-dl1.lua <<'EOF'
module("luci.controller.dl1",package.seeall)
function index()
  entry({"admin","system","dl1"},call("download_fw1"),"【下载】①纯净原版",90).dependent=false
end
function download_fw1()
  luci.http.redirect("https://github.com/你的用户名/你的仓库/releases/download/最新/n1-pure.img.gz")
end
EOF

          mkdir -p package/dl2/luasrc/view/dl2
          cat > package/dl2/luasrc-controller-dl2.lua <<'EOF'
module("luci.controller.dl2",package.seeall)
function index()
  entry({"admin","system","dl2"},call("download_fw2"),"【下载】②游戏多开",91).dependent=false
end
function download_fw2()
  luci.http.redirect("https://github.com/你的用户名/你的仓库/releases/download/最新/n1-multi.img.gz")
end
EOF

          mkdir -p package/dl3/luasrc/view/dl3
          cat > package/dl3/luasrc-controller-dl3.lua <<'EOF'
module("luci.controller.dl3",package.seeall)
function index()
  entry({"admin","system","dl3"},call("download_fw3"),"【下载】③单线加速",92).dependent=false
end
function download_fw3()
  luci.http.redirect("https://github.com/你的用户名/你的仓库/releases/download/最新/n1-accelerate.img.gz")
end
EOF

          mkdir -p package/dl4/luasrc/view/dl4
          cat > package/dl4/luasrc-controller-dl4.lua <<'EOF'
module("luci.controller.dl4",package.seeall)
function index()
  entry({"admin","system","dl4"},call("download_fw4"),"【下载】④多WAN分流",93).dependent=false
end
function download_fw4()
  luci.http.redirect("https://github.com/你的用户名/你的仓库/releases/download/最新/n1-mwan.img.gz")
end
EOF

          mkdir -p package/dl5/luasrc/view/dl5
          cat > package/dl5/luasrc-controller-dl5.lua <<'EOF'
module("luci.controller.dl5",package.seeall)
function index()
  entry({"admin","system","dl5"},call("download_fw5"),"【下载】⑤虚拟机专用",94).dependent=false
end
function download_fw5()
  luci.http.redirect("https://github.com/你的用户名/你的仓库/releases/download/最新/n1-kvm.img.gz")
end
EOF

          mkdir -p package/dl6/luasrc/view/dl6
          cat > package/dl6/luasrc-controller-dl6.lua <<'EOF'
module("luci.controller.dl6",package.seeall)
function index()
  entry({"admin","system","dl6"},call("download_fw6"),"【下载】⑥挂机稳定",95).dependent=false
end
function download_fw6()
  luci.http.redirect("https://github.com/你的用户名/你的仓库/releases/download/最新/n1-stable.img.gz")
end
EOF

          mkdir -p package/dl7/luasrc/view/dl7
          cat > package/dl7/luasrc-controller-dl7.lua <<'EOF'
module("luci.controller.dl7",package.seeall)
function index()
  entry({"admin","system","dl7"},call("download_fw7"),"【下载】⑦防封隔离",96).dependent=false
end
function download_fw7()
  luci.http.redirect("https://github.com/你的用户名/你的仓库/releases/download/最新/n1-isolate.img.gz")
end
EOF

          mkdir -p package/dl8/luasrc/view/dl8
          cat > package/dl8/luasrc-controller-dl8.lua <<'EOF'
module("luci.controller.dl8",package.seeall)
function index()
  entry({"admin","system","dl8"},call("download_fw8"),"【下载】⑧全能顶配",97).dependent=false
end
function download_fw8()
  luci.http.redirect("https://github.com/你的用户名/你的仓库/releases/download/最新/n1-full.img.gz")
end
EOF

          make defconfig

      - name: 编译
        run: cd openwrt && make -j$(nproc) V=s

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: N1_全插件_8下载_自动升级
          path: openwrt/bin/targets/armsr/armv8/*.img.gz
